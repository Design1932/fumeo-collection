<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fumeo Carlo — S/S 2027 Lookbook</title>
<style>
  :root{
    --cream:#faf8f4;
    --ink:#1a1a1a;
  }

  *{box-sizing:border-box;}

  html, body{
    margin:0;
    height:100%;
    background:var(--cream);
    color:var(--ink);
    font-family:'Helvetica Neue', Arial, sans-serif;
  }

  .screen{
    min-height:100vh;
    min-height:100dvh;
    max-width:480px;
    margin:0 auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:8vh 28px 5vh;
  }

  .logo{
    width:62%;
    max-width:260px;
    margin-bottom:10vh;
  }

  .buttons{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .btn{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 22px;
    border:1px solid var(--ink);
    text-decoration:none;
    color:var(--ink);
    font-size:14px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    background:transparent;
  }

  .btn .arrow{
    font-size:17px;
  }

  .btn-primary{
    background:var(--ink);
    color:var(--cream);
  }

  .btn-sub{
    display:block;
    font-size:9.5px;
    letter-spacing:0.08em;
    opacity:0.65;
    margin-top:3px;
    text-transform:none;
  }

  footer{
    padding-top:6vh;
    text-align:center;
    font-size:10px;
    letter-spacing:0.1em;
    color:#999;
    text-transform:uppercase;
  }

  @media (min-width:600px){
    .logo{max-width:220px; margin-bottom:64px;}
    .btn{padding:22px 26px; font-size:15px;}
    .btn-sub{font-size:10px;}
    footer{font-size:11px;}
  }
</style>
</head>
<body>

  <div class="screen">

    <img class="logo" src="assets/logo.png" alt="Fumeo Carlo">

    <div class="buttons">
      <a class="btn btn-primary" href="Fumeo-Carlo-Lookbook-SS2027.pdf" target="_blank" rel="noopener">
        <span>
          Lookbook
          <span class="btn-sub">View or download — S/S 2027 collection</span>
        </span>
        <span class="arrow">→</span>
      </a>

      <a class="btn btn-secondary" href="https://design1932.github.io/fumeo-card/" target="_blank" rel="noopener">
        <span>
          Contacts
          <span class="btn-sub">Get in touch with our team</span>
        </span>
        <span class="arrow">→</span>
      </a>
    </div>

    <footer>
      Lentate sul Seveso &nbsp;·&nbsp; Since 1932
    </footer>

  </div>

</body>
</html>
